<section class="error-page d-flex align-items-center justify-content-center min-vh-100 px-3">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center" data-aos="zoom-in">

                <div class="error-icon-wrapper my-4 pt-5">
                    <div class="heart-broken">
                        <i class="bi bi-heartbreak-fill text-danger display-1"></i>
                    </div>
                    <h1 class="error-code fw-black">404</h1>
                </div>

                <div class="error-card p-5 shadow-lg border-0 rounded-5">
                    <h2 class="fw-bold mb-3">Matches are made in heaven...</h2>
                    <p class="text-secondary mb-4 lead">
                        But this page isn't. It seems the link you followed has moved or never existed.
                        Don't worry, your soulmate is still out there!
                    </p>

                    <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
                        <button routerLink="/" class="btn btn-danger px-5 py-3 rounded-pill fw-bold shadow-sm">
                            <i class="bi bi-house-door me-2"></i>Back to Home
                        </button>
                        <button (click)="goBack()" class="btn btn-outline-secondary px-5 py-3 rounded-pill fw-bold">
                            <i class="bi bi-arrow-left me-2"></i>Go Back
                        </button>
                    </div>
                </div>
