<button class="btn rounded-pill fw-bold shadow" [ngClass]="isScrolled() ? 'btn-danger' : 'btn-outline-danger'"
    (click)="themeService.toggleTheme()">
    <i class="bi" [class.bi-moon-stars-fill]="themeService.theme() === 'light'"
        [class.bi-sun-fill]="themeService.theme() === 'dark'"></i>
</button>
